<!DOCTYPE html>
<html>
<head>
    <title>Edit Trip</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            height: 100vh;

            background: linear-gradient(to right, #e6ecf5, #f5f7fa);

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 900px;   /* bigger kari didhu */
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 30px;
        }

        input, textarea {
            width: 95%;
            padding: 14px;
            margin: 12px 0;
            border: 1px solid #ccc3c3;
            border-radius: 6px;
            font-size: 15px;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            padding: 12px 25px;
            background: green;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.85;
        }

        .back {
            margin-top: 15px;
            display: block;
            text-decoration: none;
            color: #333;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Edit Trip</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <input type="text" name="title" value="{{ trip.title }}" required>
        
        <textarea name="desc" required>{{ trip.desc }}</textarea>
        
        <input type="file" name="image">
        
        <button type="submit">Update</button>
    </form>

    <a href="/home/" class="back">Back to Home</a>

</div>

</body>
</html>
